documentation: https://github.com/tuanpmt/esp_epaper/blob/master/README.md
issues: https://github.com/tuanpmt/esp_epaper/issues
license: MIT
maintainers:
- tuanpmt
repository: https://github.com/tuanpmt/esp_epaper.git
targets:
- esp32
- esp32s2
- esp32s3
- esp32c3
- esp32c6
url: https://github.com/tuanpmt/esp_epaper
version: 2.0.0
